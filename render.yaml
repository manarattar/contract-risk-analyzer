services:

  # ── Backend API (Docker, handles chromadb native deps) ──────────────────
  - type: web
    name: contract-analyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false                        # set in Render dashboard
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: MOCK_MODE
        value: "false"
      - key: CORS_ORIGINS
        sync: false                        # set to frontend URL after first deploy
                                           # e.g. https://contract-analyzer-frontend.onrender.com

  # ── Frontend (static site, free) ────────────────────────────────────────
  - type: web
    name: contract-analyzer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: contract-analyzer-api
          type: web
          property: host               # resolves to https://contract-analyzer-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html       # SPA routing fallback
